name: Bug report
description: File a bug against AgentForge
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill this out. A precise report makes fixes much faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps needed to reproduce the issue.
      placeholder: |
        1. Set AGENT_RUNTIME_MODE=...
        2. Start a run with issueId ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste any relevant log output, stack traces, or screenshots.
      render: shell

  - type: input
    id: version
    attributes:
      label: Commit SHA or branch
      placeholder: e.g. abc1234 or master
    validations:
      required: true

  - type: dropdown
    id: runtime_mode
    attributes:
      label: AGENT_RUNTIME_MODE
      options:
        - mock
        - real
        - both / not relevant
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 22.22.2
    validations:
      required: true
